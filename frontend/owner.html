<!doctype html>
<html class="scroll-smooth" lang="vi">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>Courtify | Owner Dashboard</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;600;700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "surface-tint": "#4059aa",
            "surface-container-low": "#eff4ff",
            "tertiary-fixed-dim": "#ffb690",
            "on-secondary-container": "#536d22",
            "tertiary-fixed": "#ffdbca",
            "surface-dim": "#cbdbf5",
            outline: "#757682",
            "primary-fixed-dim": "#b6c4ff",
            "surface-container-highest": "#d3e4fe",
            "inverse-on-surface": "#eaf1ff",
            "on-secondary-fixed": "#131f00",
            secondary: "#4d661c",
            "on-error": "#ffffff",
            "on-tertiary-fixed": "#341100",
            tertiary: "#4b1c00",
            "on-primary": "#ffffff",
            "surface-variant": "#d3e4fe",
            "on-primary-fixed-variant": "#264191",
            "primary-container": "#1e3a8a",
            "on-tertiary": "#ffffff",
            "on-error-container": "#93000a",
            error: "#ba1a1a",
            "inverse-surface": "#213145",
            "inverse-primary": "#b6c4ff",
            "on-primary-fixed": "#00164e",
            "surface-container": "#e5eeff",
            "surface-container-lowest": "#ffffff",
            "secondary-fixed": "#ceee93",
            primary: "#00236f",
            background: "#f8f9ff",
            "on-secondary": "#ffffff",
            "on-surface-variant": "#444651",
            "outline-variant": "#c5c5d3",
            "on-tertiary-container": "#ff8f4f",
            "surface-container-high": "#dce9ff",
            "primary-fixed": "#dce1ff",
            "secondary-container": "#ceee93",
            "on-tertiary-fixed-variant": "#783200",
            "on-surface": "#0b1c30",
            "error-container": "#ffdad6",
            "secondary-fixed-dim": "#b3d17a",
            "on-background": "#0b1c30",
            surface: "#f8f9ff",
            "on-secondary-fixed-variant": "#364e03",
            "on-primary-container": "#90a8ff",
            "tertiary-container": "#6e2d00",
            "surface-bright": "#f8f9ff",
          },
          borderRadius: {
            DEFAULT: "0.25rem",
            lg: "0.5rem",
            xl: "0.75rem",
            full: "9999px",
          },
          spacing: {
            xs: "4px",
            gutter: "24px",
            "margin-mobile": "16px",
            base: "4px",
            sm: "8px",
            lg: "24px",
            xl: "48px",
            md: "16px",
            "container-max": "1280px",
          },
          fontFamily: {
            "headline-lg": ["Lexend"],
            "label-md": ["Hanken Grotesk"],
            "headline-lg-mobile": ["Lexend"],
            "body-lg": ["Hanken Grotesk"],
            "headline-md": ["Lexend"],
            "headline-xl": ["Lexend"],
            "label-sm": ["Hanken Grotesk"],
            "body-md": ["Hanken Grotesk"],
          },
          fontSize: {
            "headline-lg": [
              "32px",
              {
                lineHeight: "1.2",
                letterSpacing: "-0.01em",
                fontWeight: "700",
              },
            ],
            "label-md": [
              "14px",
              {
                lineHeight: "1.2",
                letterSpacing: "0.05em",
                fontWeight: "600",
              },
            ],
            "headline-lg-mobile": [
              "24px",
              { lineHeight: "1.2", fontWeight: "700" },
            ],
            "body-lg": ["18px", { lineHeight: "1.6", fontWeight: "400" }],
            "headline-md": ["20px", { lineHeight: "1.4", fontWeight: "600" }],
            "headline-xl": [
              "40px",
              {
                lineHeight: "1.2",
                letterSpacing: "-0.02em",
                fontWeight: "700",
              },
            ],
            "label-sm": ["12px", { lineHeight: "1.2", fontWeight: "500" }],
            "body-md": ["16px", { lineHeight: "1.6", fontWeight: "400" }],
          },
        },
      },
    };
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings:
        "FILL" 0,
        "wght" 400,
        "GRAD" 0,
        "opsz" 24;
    }

    /* Sidebar */
    .owner-sidebar {
      background: linear-gradient(180deg, #00236f 0%, #0a1628 100%);
    }

    .owner-sidebar a.active,
    .owner-sidebar button.active {
      background: rgba(255, 255, 255, 0.15);
      border-left: 3px solid #90a8ff;
    }

    .owner-sidebar a:hover,
    .owner-sidebar button:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    /* Table styles */
    .owner-table th {
      background-color: #eff4ff;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #444651;
    }

    .owner-table tr:hover td {
      background-color: #f8f9ff;
    }

    /* Stat cards */
    .stat-card {
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .stat-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px -8px rgba(0, 35, 111, 0.2);
    }

    /* Status badges */
    .badge-pending {
      background: #fef3c7;
      color: #92400e;
      border: 1px solid #fcd34d;
    }

    .badge-confirmed {
      background: #dbeafe;
      color: #1e40af;
      border: 1px solid #93c5fd;
    }

    .badge-completed {
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #6ee7b7;
    }

    .badge-cancelled {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }

    .badge-active {
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #6ee7b7;
    }

    .badge-inactive {
      background: #f3f4f6;
      color: #6b7280;
      border: 1px solid #d1d5db;
    }

    .badge-maintenance {
      background: #fef3c7;
      color: #92400e;
      border: 1px solid #fcd34d;
    }

    .badge-expired {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }
  </style>
</head>

<body class="bg-background text-on-background font-body-md">
  <div id="app" class="flex items-center justify-center min-h-screen">
    <div class="inline-block w-10 h-10 border-4 border-primary/20 border-t-primary rounded-full animate-spin"></div>
  </div>
  <script type="module" src="./src/dist/owner.js"></script>
</body>

</html>
